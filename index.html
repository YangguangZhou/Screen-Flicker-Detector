    <script>
        const video = document.getElementById('videoElement');
        const viewCanvas = document.getElementById('viewCanvas');
        const viewCtx = viewCanvas.getContext('2d', { willReadFrequently: true });

        const spatialCanvas = document.getElementById('spatialCanvas');
        const spatialCtx = spatialCanvas.getContext('2d');
        const temporalCanvas = document.getElementById('temporalCanvas');
        const temporalCtx = temporalCanvas.getContext('2d');

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const switchBtn = document.getElementById('switchBtn');
        const startOverlay = document.getElementById('startOverlay');
        const errorMsg = document.getElementById('errorMsg');

        // UI 状态元素
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const freqEst = document.getElementById('freqEst');
        const depthEst = document.getElementById('depthEst');
        const gradeBadge = document.getElementById('gradeBadge');
        const gradeTitle = document.getElementById('gradeTitle');
        const gradeDesc = document.getElementById('gradeDesc');

        let stream = null;
        let isRunning = false;
        let facingMode = 'environment';
        let animationId;

        // PWA Install Prompt
        let deferredPrompt;
        const pwaContainer = document.getElementById('pwaContainer');
        const installPwaBtn = document.getElementById('installPwaBtn');
        const pwaGuideCard = document.getElementById('pwaGuideCard');
        const pwaGuideText = document.getElementById('pwaGuideText');
        const closePwaGuide = document.getElementById('closePwaGuide');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            pwaContainer.classList.remove('hidden');
        });

        closePwaGuide.addEventListener('click', () => {
            pwaGuideCard.classList.add('hidden');
        });

        installPwaBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    pwaContainer.classList.add('hidden');
                }
                deferredPrompt = null;
            } else {
                showPwaGuide();
            }
        });

        function showPwaGuide() {
            pwaGuideCard.classList.remove('hidden');
            const ua = navigator.userAgent.toLowerCase();
            const isIOS = /iphone|ipad|ipod/.test(ua);
            
            let guideHTML = "由于您的浏览器限制，请点按浏览器菜单中的分享图标或选项菜单，然后选择<span class='font-medium text-gray-900'>「添加到主屏幕」</span>。";

            if (isIOS) {
                if (ua.includes('safari') && !ua.includes('crios') && !ua.includes('fxios')) {
                    guideHTML = "在 Safari 中：<br>1. 点按屏幕底部的<b class='text-blue-500'> 分享 </b>[<svg class='w-4 h-4 inline mb-1' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12'></path></svg>] 图标<br>2. 向下滑动并选择 <b class='text-gray-900'>「添加到主屏幕」</b>";
                } else if (ua.includes('crios')) {
                    guideHTML = "在 Chrome 浏览器中：<br>1. 点按右上角的 <b class='text-blue-500'>分享</b> 图标<br>2. 向下滑动并选择 <b class='text-gray-900'>「添加到主屏幕」</b>";
                } else {
                    guideHTML = "在当前浏览器中：<br>请点按分享菜单中的 <b class='text-gray-900'>「添加到主屏幕」</b> 选项。建议使用 Safari 获得最佳体验。";
                }
            } else {
                if (ua.includes('firefox')) {
                    guideHTML = "在 Firefox 浏览器中：<br>1. 点按右下角或右上角的 <b>菜单 (⋮)</b><br>2. 选择 <b class='text-gray-900'>「安装」 或 「添加到主屏幕」</b>";
                } else if (ua.includes('chrome') || ua.includes('edg')) {
                    guideHTML = "当前浏览器不支持直接安装：<br>1. 请点按右上角的 <b>菜单 (⋮)</b><br>2. 选择 <b class='text-gray-900'>「添加到主屏幕」</b>";
                }
            }
            pwaGuideText.innerHTML = guideHTML;
        }

        if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
            pwaContainer.classList.add('hidden');
        } else {
            const isIos = () => {
                const userAgent = window.navigator.userAgent.toLowerCase();
                return /iphone|ipad|ipod/.test(userAgent);
            };
            if (isIos() && 'standalone' in window.navigator && !window.navigator.standalone) {
                pwaContainer.classList.remove('hidden');
            } else if (!isIos()) {
                pwaContainer.classList.remove('hidden');
            }
        }

        const temporalData = new Array(100).fill(0);
        const resultBuffer = []; 

        const ASSUMED_READOUT_TIME_MS = 33.3;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;

            spatialCanvas.width = spatialCanvas.clientWidth * dpr;
            spatialCanvas.height = spatialCanvas.clientHeight * dpr;
            spatialCtx.scale(dpr, dpr);

            temporalCanvas.width = temporalCanvas.clientWidth * dpr;
            temporalCanvas.height = temporalCanvas.clientHeight * dpr;
            temporalCtx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);

        async function initCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());

            try {
                statusText.textContent = "连接中...";
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode, width: { ideal: 480 }, height: { ideal: 640 } },
                    audio: false
                });

                video.srcObject = stream;
                video.play();

                video.onloadedmetadata = () => {
                    viewCanvas.width = video.videoWidth;
                    viewCanvas.height = video.videoHeight;
                    resizeCanvas();

                    startOverlay.classList.add('hidden');
                    stopBtn.classList.remove('hidden');
                    switchBtn.classList.remove('hidden');
                    errorMsg.classList.add('hidden');

                    statusIndicator.className = 'absolute w-full h-full rounded-full bg-green-500 animate-pulse';
                    statusText.textContent = "实时分析中";

                    if (!isRunning) {
                        isRunning = true;
                        processFrame();
                    }
                };
            } catch (err) {
                console.error("Camera error:", err);
                let errText = "无法连接相机";
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    errText = "权限被拒绝，请允许网页访问相机。";
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    errText = "未找到相机设备。";
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    errText = "相机可能被占用。";
                }
                errorMsg.innerHTML = `<span class="font-medium">${errText}</span>`;
                errorMsg.classList.remove('hidden');
                statusText.textContent = "访问失败";
                statusIndicator.className = 'absolute w-full h-full rounded-full bg-red-500';
            }
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            isRunning = false;
            cancelAnimationFrame(animationId);

            startOverlay.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            switchBtn.classList.add('hidden');

            statusIndicator.className = 'absolute w-full h-full rounded-full bg-gray-300';
            statusText.textContent = "已暂停";

            resetUI();
        }

        function resetUI() {
            viewCtx.clearRect(0, 0, viewCanvas.width, viewCanvas.height);
            spatialCtx.clearRect(0, 0, spatialCanvas.width, spatialCanvas.height);
            temporalCtx.clearRect(0, 0, temporalCanvas.width, temporalCanvas.height);
            freqEst.innerHTML = '--';
            depthEst.innerHTML = '--';
            updateGradeUI('IDLE');
        }

        function processFrame() {
            if (!isRunning) return;
            viewCtx.drawImage(video, 0, 0, viewCanvas.width, viewCanvas.height);

            const cropW = Math.floor(viewCanvas.width * 0.55);
            const cropH = Math.floor(viewCanvas.height * 0.55);
            const cropX = Math.floor((viewCanvas.width - cropW) / 2);
            const cropY = Math.floor((viewCanvas.height - cropH) / 2);

            if (cropW > 0 && cropH > 0) {
                const imageData = viewCtx.getImageData(cropX, cropY, cropW, cropH);
                const data = imageData.data;

                const rowLuminance = new Float32Array(cropH);
                let frameTotalLuminance = 0;

                for (let y = 0; y < cropH; y++) {
                    let rowSum = 0;
                    for (let x = 0; x < cropW; x++) {
                        const i = (y * cropW + x) * 4;
                        const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                        rowSum += lum;
                    }
                    rowLuminance[y] = rowSum / cropW;
                    frameTotalLuminance += rowLuminance[y];
                }

                temporalData.push(frameTotalLuminance / cropH);
                temporalData.shift();

                analyzeData(rowLuminance);
                drawTemporalGraph();
            }

            animationId = requestAnimationFrame(processFrame);
        }

        function analyzeData(rowLuminance) {
            const h = rowLuminance.length;

            const windowSize = Math.max(5, Math.floor(h / 20));
            const detrended = new Float32Array(h);

            for (let i = 0; i < h; i++) {
                let sum = 0, count = 0;
                let start = Math.max(0, i - windowSize);
                let end = Math.min(h - 1, i + windowSize);
                for (let j = start; j <= end; j++) {
                    sum += rowLuminance[j];
                    count++;
                }
                detrended[i] = rowLuminance[i] - (sum / count);
            }

            let crossings = 0;
            let variance = 0;
            const threshold = 0.5; 

            let maxLum = rowLuminance[0];
            let minLum = rowLuminance[0];

            for (let i = 1; i < h; i++) {
                variance += Math.abs(detrended[i]);
                if (detrended[i] > threshold && detrended[i - 1] <= threshold) {
                    crossings++;
                }
                if (rowLuminance[i] > maxLum) maxLum = rowLuminance[i];
                if (rowLuminance[i] < minLum) minLum = rowLuminance[i];
            }
            variance = variance / h;

            let modDepth = 0;
            if (maxLum + minLum > 0) {
                modDepth = (maxLum - minLum) / (maxLum + minLum) * 100;
            }

            const assumedAreaReadTime = ASSUMED_READOUT_TIME_MS * 0.55;
            let estimatedHz = (crossings / (assumedAreaReadTime / 1000));

            let currentStatus = 'GOOD';
            if (modDepth > 8 || (variance > 1.2 && crossings >= 2)) {
                currentStatus = 'BAD';
            } else if (modDepth > 3 || (variance > 0.6 && crossings > 1)) {
                currentStatus = 'WARNING';
            }

            resultBuffer.push({ status: currentStatus, freq: estimatedHz, variance, modDepth: modDepth });
            if (resultBuffer.length > 15) resultBuffer.shift();

            updateAnalysisResult();
            drawSpatialGraph(detrended);
        }

        function updateAnalysisResult() {
            if (resultBuffer.length < 5) return;

            const counts = { GOOD: 0, WARNING: 0, BAD: 0 };
            let avgFreq = 0;
            let avgDepth = 0;
            let validFreqCount = 0;

            resultBuffer.forEach(r => {
                counts[r.status]++;
                avgDepth += r.modDepth || 0;
                if (r.status === 'BAD' || r.status === 'WARNING') {
                    avgFreq += r.freq;
                    validFreqCount++;
                }
            });

            let finalStatus = 'GOOD';
            if (counts.BAD > resultBuffer.length * 0.4) finalStatus = 'BAD';
            else if (counts.WARNING > resultBuffer.length * 0.4) finalStatus = 'WARNING';

            updateGradeUI(finalStatus);

            let displayDepth = (avgDepth / resultBuffer.length).toFixed(1);
            if (displayDepth > 0 && finalStatus !== 'IDLE') {
                depthEst.textContent = displayDepth;
            } else {
                depthEst.textContent = '--';
            }

            if (finalStatus !== 'GOOD' && validFreqCount > 0) {
                let displayFreq = Math.round(avgFreq / validFreqCount);
                if (Math.abs(displayFreq - 100) < 15) displayFreq = 100;
                else if (Math.abs(displayFreq - 120) < 15) displayFreq = 120;
                freqEst.textContent = `~${displayFreq}`;
            } else {
                freqEst.textContent = '--';
            }
        }

        function updateGradeUI(status) {
            const uiConf = {
                IDLE: {
                    bg: 'bg-gray-50 border-gray-100', color: 'text-gray-400', text: '-',
                    title: '分析数据', desc: '请启动相机获取检测结果。'
                },
                GOOD: {
                    bg: 'bg-green-50 border-green-100', color: 'text-green-600', text: '优',
                    title: '光源无明显频闪', desc: '极佳光线。未检测到有害的高频波动，十分适合长时阅读。'
                },
                WARNING: {
                    bg: 'bg-yellow-50 border-yellow-100', color: 'text-yellow-600', text: '良',
                    title: '存在轻微波动', desc: '日常光线。有些许明暗变化，敏感人群久看可能会受影响。'
                },
                BAD: {
                    bg: 'bg-red-50 border-red-100', color: 'text-red-600', text: '差',
                    title: '存在严重闪烁', desc: '波动极强。长时间处于此灯光下易导致眼疲劳，建议更换光源。'
                }
            };

            const conf = uiConf[status];

            if (gradeBadge.dataset.status !== status) {
                gradeBadge.className = `shrink-0 w-14 h-14 rounded-full border flex items-center justify-center text-xl font-semibold transition-all duration-300 ${conf.bg} ${conf.color}`;
                gradeBadge.textContent = conf.text;
                gradeBadge.dataset.status = status;

                gradeTitle.textContent = conf.title;
                gradeTitle.className = `text-[15px] font-semibold ${status === 'BAD' ? 'text-red-600' : 'text-gray-900'}`;
                gradeDesc.textContent = conf.desc;
            }
        }

        function drawSpatialGraph(data) {
            const ctx = spatialCtx;
            const w = spatialCanvas.clientWidth;
            const h = spatialCanvas.clientHeight;

            ctx.clearRect(0, 0, w, h);

            ctx.beginPath();
            ctx.strokeStyle = '#e5e7eb'; 
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.beginPath();
            ctx.strokeStyle = '#111827'; 
            ctx.lineWidth = 1.5;
            ctx.lineJoin = 'round';

            const maxVal = Math.max(8, ...data.map(Math.abs));

            for (let i = 0; i < data.length; i++) {
                const x = (i / data.length) * w;
                const y = h / 2 - (data[i] / maxVal) * (h / 2) * 0.8;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawTemporalGraph() {
            const ctx = temporalCtx;
            const w = temporalCanvas.clientWidth;
            const h = temporalCanvas.clientHeight;

            ctx.clearRect(0, 0, w, h);
            ctx.beginPath();
            ctx.strokeStyle = '#4b5563'; 
            ctx.lineWidth = 1.5;
            ctx.lineJoin = 'round';

            let minVal = 255, maxVal = 0;
            temporalData.forEach(v => {
                if (v < minVal) minVal = v;
                if (v > maxVal) maxVal = v;
            });

            const range = Math.max(3, maxVal - minVal);

            for (let i = 0; i < temporalData.length; i++) {
                const x = (i / temporalData.length) * w;
                const y = h - ((temporalData[i] - minVal + range * 0.1) / (range * 1.2)) * h;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        startBtn.addEventListener('click', initCamera);
        stopBtn.addEventListener('click', stopCamera);
        switchBtn.addEventListener('click', () => {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            initCamera();
        });

        resizeCanvas();
    </script>
</body>
